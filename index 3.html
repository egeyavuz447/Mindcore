<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindCore — AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefec;--text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--blue:#0C447C;--blue-light:#E6F1FB;--blue-mid:#378ADD;--radius:12px;--radius-sm:8px; }
    @media (prefers-color-scheme: dark) { :root { --bg:#1a1a18;--bg2:#242420;--bg3:#2e2e2a;--text:#e8e8e0;--text2:#9b9b96;--text3:#6b6b66;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--blue:#378ADD;--blue-light:#042C53;--blue-mid:#85B7EB; } }
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text)}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;background:var(--bg);border-left:0.5px solid var(--border);border-right:0.5px solid var(--border)}
    #topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
    #logo{display:flex;align-items:center;gap:10px}
    #logo-icon{width:34px;height:34px;background:var(--blue);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
    #logo-icon svg{width:18px;height:18px}
    #logo-name{font-size:16px;font-weight:600;letter-spacing:-0.3px}
    #logo-sub{font-size:11px;color:var(--text2);letter-spacing:0.4px;text-transform:uppercase}
    #plan-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;user-select:none;transition:all .2s}
    #plan-pill.premium{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue);font-weight:500}
    #tabs{display:flex;gap:4px;padding:10px 16px;border-bottom:0.5px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    #tabs::-webkit-scrollbar{display:none}
    .tab{padding:6px 14px;border-radius:20px;border:0.5px solid transparent;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;background:transparent;font-family:inherit;transition:all .15s}
    .tab.active{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue);font-weight:500}
    .tab:hover:not(.active){background:var(--bg2)}
    #messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:80%;padding:11px 15px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
    .msg.user{align-self:flex-end;background:var(--blue);color:var(--blue-light);border-radius:16px 16px 4px 16px}
    .msg.bot{align-self:flex-start;background:var(--bg2);color:var(--text);border:0.5px solid var(--border);border-radius:16px 16px 16px 4px}
    .msg.thinking{color:var(--text3);font-style:italic}
    #usage{display:flex;align-items:center;gap:10px;padding:8px 20px;border-top:0.5px solid var(--border);flex-shrink:0}
    #usage-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    #usage-fill{height:3px;background:var(--blue-mid);border-radius:2px;width:0%;transition:width .4s}
    #usage-label{font-size:11px;color:var(--text3);white-space:nowrap;min-width:90px;text-align:right}
    #upgrade-banner{display:none;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--blue-light);border-top:0.5px solid var(--blue-mid);flex-shrink:0}
    #upgrade-banner span{font-size:13px;color:var(--blue)}
    #upgrade-btn{font-size:12px;padding:5px 14px;background:var(--blue);color:var(--blue-light);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-weight:500}
    #inputrow{display:flex;gap:8px;padding:12px 16px 16px;border-top:0.5px solid var(--border);align-items:flex-end;flex-shrink:0}
    #userinput{flex:1;padding:9px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);font-size:14px;font-family:inherit;color:var(--text);resize:none;outline:none;min-height:38px;max-height:100px;line-height:1.5;transition:border-color .2s}
    #userinput:focus{border-color:var(--blue-mid)}
    #userinput::placeholder{color:var(--text3)}
    #sendbtn{width:38px;height:38px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
    #sendbtn:hover{background:var(--blue-mid)}
    #sendbtn:active{transform:scale(0.94)}
    #sendbtn:disabled{background:var(--border);cursor:not-allowed}
    #sendbtn svg{width:15px;height:15px;fill:white}
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">
      <div id="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" fill="white" opacity="0.9"/>
          <path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M5.6 18.4l1.8-1.8M16.6 7.4l1.8-1.8" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
      <div>
        <div id="logo-name">MindCore</div>
        <div id="logo-sub">AI Assistant</div>
      </div>
    </div>
    <div id="plan-pill" onclick="togglePremium()">Free plan</div>
  </div>
  <div id="tabs">
    <button class="tab active" onclick="setMode(this,'chat')">Chat</button>
    <button class="tab" onclick="setMode(this,'write')">Write</button>
    <button class="tab" onclick="setMode(this,'code')">Code</button>
    <button class="tab" onclick="setMode(this,'research')">Research</button>
    <button class="tab" onclick="setMode(this,'factcheck')">Fact-check</button>
  </div>
  <div id="messages">
    <div class="msg bot">Welcome to MindCore. I'm your professional AI assistant. Select a mode above and ask me anything.</div>
  </div>
  <div id="usage">
    <div id="usage-track"><div id="usage-fill"></div></div>
    <div id="usage-label">0 / 10 messages</div>
  </div>
  <div id="upgrade-banner">
    <span>You've reached the free limit. Upgrade for unlimited access.</span>
    <button id="upgrade-btn" onclick="togglePremium()">Upgrade</button>
  </div>
  <div id="inputrow">
    <textarea id="userinput" rows="1" placeholder="Ask anything..."></textarea>
    <button id="sendbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>
<script>
const FREE_LIMIT=10;let mode='chat',count=0,isPremium=false;
const systems={chat:'You are MindCore, a professional and precise AI assistant. Be concise, clear, and helpful. Respond in 1-3 paragraphs max.',write:'You are MindCore, an expert writing assistant. Help draft, edit, and improve text with professional precision. Be concise.',code:'You are MindCore, a senior software engineer assistant. Provide clean, well-structured code with brief explanations. Be concise.',research:'You are MindCore, a research specialist. Provide structured, accurate, well-organized analysis on any topic. Be concise.',factcheck:'You are MindCore, a fact-verification specialist. Label claims as TRUE, FALSE, or PARTLY TRUE, then explain concisely.'};
const placeholders={chat:'Ask anything...',write:'Paste text to improve, or describe what to write...',code:'Describe your task or paste code to review...',research:'Enter a topic to research...',factcheck:'Enter a claim to verify...'};
const greetings={chat:'Chat mode. Ask me anything.',write:'Writing mode. Share text to edit or describe what you need.',code:'Code mode. Describe your task or paste code for review.',research:'Research mode. What topic shall I analyze?',factcheck:'Fact-check mode. Submit any claim for verification.'};
function setMode(btn,m){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mode=m;document.getElementById('userinput').placeholder=placeholders[m];addMsg('bot',greetings[m]);}
function addMsg(role,text){const el=document.createElement('div');el.className='msg '+role;el.textContent=text;const msgs=document.getElementById('messages');msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;return el;}
function updateUsage(){const pct=isPremium?0:Math.min((count/FREE_LIMIT)*100,100);document.getElementById('usage-fill').style.width=pct+'%';document.getElementById('usage-label').textContent=isPremium?'Unlimited':count+' / '+FREE_LIMIT+' messages';const banner=document.getElementById('upgrade-banner');const btn=document.getElementById('sendbtn');if(!isPremium&&count>=FREE_LIMIT){banner.style.display='flex';btn.disabled=true;}else{banner.style.display='none';btn.disabled=false;}}
function togglePremium(){isPremium=!isPremium;const pill=document.getElementById('plan-pill');pill.textContent=isPremium?'Premium':'Free plan';pill.className=isPremium?'premium':'';updateUsage();addMsg('bot',isPremium?'Premium activated. Unlimited access enabled.':'Switched to free plan. 10 messages per day.');}
async function send(){const inp=document.getElementById('userinput');const text=inp.value.trim();if(!text||(!isPremium&&count>=FREE_LIMIT))return;inp.value='';inp.style.height='auto';addMsg('user',text);count++;updateUsage();const thinking=addMsg('bot thinking','Processing...');
try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:systems[mode],messages:[{role:'user',content:text}]})});const data=await res.json();thinking.classList.remove('thinking');thinking.textContent=data.reply||data.error||'An error occurred.';}catch(e){thinking.classList.remove('thinking');thinking.textContent='Connection error. Please try again.';}
document.getElementById('messages').scrollTop=99999;}
const inp=document.getElementById('userinput');
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
</script>
</body>
</html>
